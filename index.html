<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">
<div class="headerLeft">
<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<h1>Global Strategic Awareness OSINT</h1>
</div>
<div id="dateTime"></div>
</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<!-- SUB MENUS -->
<div id="subMenuBar">

<div id="liveMenu" class="subMenu">
<button onclick="showLive(event,'rt')" class="active">RT</button>
<button onclick="showLive(event,'aj')">Al Jazeera</button>
<button onclick="showLive(event,'wion')">Sky News</button>
<button onclick="showLive(event,'sky')">WION</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marineMenu" class="subMenu">
<button onclick="showMarineTraffic(event)" class="active">Marine Traffic</button>
<button onclick="showMarinePoint(event,'hormuz')">Hormuz</button>
<button onclick="showMarinePoint(event,'malacca')">Malacca</button>
<button onclick="showMarinePoint(event,'bab')">Bab el-Mandeb</button>
<button onclick="showMarinePoint(event,'suez')">Suez</button>
<button onclick="showMarinePoint(event,'panama')">Panama</button>
<button onclick="showMarinePoint(event,'bosporus')">Bosporus</button>
<button onclick="showMarinePoint(event,'gibraltar')">Gibraltar</button>
<button onclick="showMarinePoint(event,'dover')">Dover</button>
</div>

<div id="marketsMenu" class="subMenu">
<button onclick="showMarket(event,'quotes')" class="active">Quotes</button>
<button onclick="showMarket(event,'overview')">Overview</button>
<button onclick="showMarket(event,'stocks')">Stock Heatmap</button>
<button onclick="showMarket(event,'crypto')">Crypto Heatmap</button>
</div>

</div>

<main>

<!-- HOME -->
<section id="home" class="tab active">
<div class="homeHero">
<img src="hero.png" class="heroImage">
<div class="heroOverlay">
<h2>BSG Strategic Awareness Dashboard</h2>
<p>Integrated OSINT monitoring platform.</p>
</div>
</div>
</section>

<!-- LIVE -->
<section id="live" class="tab">
<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame" src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
</div>

<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc"></iframe>
</div>
</section>

<!-- MARKETS -->
<section id="markets" class="tab">

<div id="marketQuotes">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async></script>
</div>
</div>

<div id="marketOverview" style="display:none;"></div>
<div id="marketStocks" style="display:none;"></div>
<div id="marketCrypto" style="display:none;"></div>

</section>

<!-- OTHER -->
<section id="conflict" class="tab"><iframe src="https://iran.liveuamap.com"></iframe></section>
<section id="aircraft" class="tab"><iframe src="https://globe.adsbexchange.com"></iframe></section>
<section id="marine" class="tab"><iframe id="marineFrame" src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"></iframe></section>
<section id="cyber" class="tab"><iframe src="https://threatmap.checkpoint.com"></iframe></section>
<section id="radio" class="tab"><iframe src="https://radio.garden/"></iframe></section>

</main>

<footer class="mainFooter">
<div class="footerCenter">
<a href="https://BlackSurvivalGear.com" target="_blank">BlackSurvivalGear.com</a>
</div>
<div class="footerRight">BSG OSINT — VBASE</div>
</footer>

<script>

/* SPLASH — FIXED */
document.addEventListener("DOMContentLoaded", function(){

const splash = document.getElementById("introRadar");

// Fail-safe kill
setTimeout(()=>{
    splash.style.display="none"
},4000);

// Fade out
setTimeout(()=>{
    splash.style.opacity="0";
    setTimeout(()=>{
        splash.style.display="none"
    },600);
},1500);

});

/* CLOCK */
setInterval(()=>{
document.getElementById("dateTime").textContent=new Date().toLocaleString()
},1000)

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

document.getElementById("subMenuBar").style.display="none"
document.querySelectorAll(".subMenu").forEach(m=>m.style.display="none")

if(btn.dataset.tab==="live"){
subMenuBar.style.display="block"
liveMenu.style.display="flex"
}
if(btn.dataset.tab==="marine"){
subMenuBar.style.display="block"
marineMenu.style.display="flex"
}
if(btn.dataset.tab==="markets"){
subMenuBar.style.display="block"
marketsMenu.style.display="flex"
}
}
})

/* MARKETS */
function showMarket(e,t){
document.querySelectorAll("#marketsMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const panels={
quotes:marketQuotes,
overview:marketOverview,
stocks:marketStocks,
crypto:marketCrypto
}

Object.values(panels).forEach(p=>p.style.display="none")
panels[t].style.display="block"

setTimeout(()=>window.dispatchEvent(new Event('resize')),100)
}

/* FULLSCREEN */
function fullscreenPlayer(){
let player=document.getElementById("liveQuad")
if(player.style.display!=="grid") player=document.getElementById("liveSingle")
player.requestFullscreen()
}

/* WEATHER */
weatherBtn.onclick=()=>{
window.open("https://www.windy.com","_blank","noopener,noreferrer")
}

/* LIVE */
function showLive(e,c){
document.getElementById("liveSingle").style.display="block"
document.getElementById("liveQuad").style.display="none"

if(c==="quad"){
liveSingle.style.display="none"
liveQuad.style.display="grid"
}
}

/* MARINE */
function showMarineTraffic(){
document.getElementById("marineFrame").src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"
}

function showMarinePoint(e,p){
document.querySelectorAll("#marineMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
document.getElementById("marineFrame").src=`https://maps.google.com/maps?q=${p}&output=embed`
}

</script>

</body>
</html>
