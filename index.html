<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
/* QUAD FOCUS MODE */
.quadGrid.quadFocus iframe { display:none; }

.quadGrid.quadFocus iframe.activeQuad{
display:block;
width:100%;
height:100%;
grid-column:1/-1;
grid-row:1/-1;
}

/* TRADINGVIEW FIX */
.tradingview-widget-container,
.tradingview-widget-container__widget{
width:100%!important;
height:80vh!important;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">
<div class="headerLeft">
<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<h1>Global Strategic Awareness OSINT</h1>
</div>
<div id="dateTime"></div>
</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<!-- SUB MENUS -->
<div id="subMenuBar">

<div id="liveMenu" class="subMenu">
<button onclick="showLive(event,'rt')" class="active">RT</button>
<button onclick="showLive(event,'aj')">Al Jazeera</button>
<button onclick="showLive(event,'wion')">Sky News</button>
<button onclick="showLive(event,'sky')">WION</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marineMenu" class="subMenu">
<button onclick="showMarineTraffic(event)" class="active">Marine Traffic</button>
</div>

<div id="marketsMenu" class="subMenu">
<button onclick="showMarket(event,'quotes')" class="active">Quotes</button>
<button onclick="showMarket(event,'overview')">Overview</button>
<button onclick="showMarket(event,'stocks')">Stock Heatmap</button>
<button onclick="showMarket(event,'crypto')">Crypto Heatmap</button>
</div>

</div>

<main>

<section id="home" class="tab active">
<div class="homeHero">
<img src="hero.png" class="heroImage">
<div class="heroOverlay">
<h2>BSG Strategic Awareness Dashboard</h2>
<p>Integrated OSINT monitoring platform.</p>
</div>
</div>
</section>

<!-- LIVE -->
<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"></iframe>
</div>

<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo?mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA?mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc?mute=1"></iframe>
</div>

</section>

<!-- MARKETS (UNCHANGED WORKING) -->
<section id="markets" class="tab">
<div id="marketQuotes" class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>
<div id="marketOverview" style="display:none;"></div>
<div id="marketStocks" style="display:none;"></div>
<div id="marketCrypto" style="display:none;"></div>
</section>

</main>

<footer class="mainFooter">
<div class="footerTop">
<video autoplay muted loop playsinline><source src="RADAR3.mp4"></video>
</div>
<div class="footerCenter">
<a href="https://BlackSurvivalGear.com">BlackSurvivalGear.com</a>
</div>
</footer>

<script>

/* SPLASH */
document.addEventListener("DOMContentLoaded",()=>{
setTimeout(()=>introRadar.style.display="none",1500)
})

/* CLOCK */
setInterval(()=>dateTime.textContent=new Date().toLocaleString(),1000)

/* LIVE SWITCH */
function showLive(e,c){
document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

liveSingle.style.display="block"
liveQuad.style.display="none"

if(c==="rt") liveFrame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"
if(c==="aj") liveFrame.src="https://www.youtube.com/embed/gCNeDWCI0vo?mute=1"
if(c==="wion") liveFrame.src="https://www.youtube.com/embed/YDvsBbKfLPA?mute=1"
if(c==="sky") liveFrame.src="https://www.youtube.com/embed/vfszY1JYbMc?mute=1"

if(c==="quad"){
liveSingle.style.display="none"
liveQuad.style.display="grid"
}

}

/* AUDIO CONTROL */
function setFrameAudio(frame, mute){
let src = frame.src.replace(/(\?|&)mute=\d/,'')
frame.src = src + (src.includes("?")?"&":"?") + "mute=" + (mute?1:0)
}

/* QUAD CLICK */
document.querySelectorAll("#liveQuad iframe").forEach(frame=>{
frame.addEventListener("click",function(){

if(!document.fullscreenElement) return

const quad = liveQuad
const frames = document.querySelectorAll("#liveQuad iframe")

frames.forEach(f=>setFrameAudio(f,true))

if(!quad.classList.contains("quadFocus")){
quad.classList.add("quadFocus")
frames.forEach(f=>f.classList.remove("activeQuad"))
this.classList.add("activeQuad")
setFrameAudio(this,false)

}else{
if(this.classList.contains("activeQuad")){
quad.classList.remove("quadFocus")
frames.forEach(f=>setFrameAudio(f,true))
}else{
frames.forEach(f=>f.classList.remove("activeQuad"))
this.classList.add("activeQuad")
setFrameAudio(this,false)
}
}

})
})

/* FULLSCREEN */
function fullscreenPlayer(){
let p=liveQuad.style.display==="grid"?liveQuad:liveSingle
p.requestFullscreen()
}

/* WEATHER */
weatherBtn.onclick=()=>window.open("https://www.windy.com","_blank")

</script>

</body>
</html>
