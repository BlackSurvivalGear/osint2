<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">
<div class="headerLeft">
<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<h1>Global Strategic Awareness OSINT</h1>
</div>
<div id="dateTime"></div>
</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="africa">AFRICA NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<!-- SUBMENU -->
<div id="subMenuBar">
<div id="liveMenu" class="subMenu">

<button onclick="showLive(event,'aj')" class="active">Al Jazeera</button>
<button onclick="showLive(event,'arise')">Arise</button>
<button onclick="showLive(event,'channels')">Channels</button>
<button onclick="showLive(event,'africanews')">Africanews</button>
<button onclick="showLive(event,'rt')">RT</button>
<button onclick="showLive(event,'sky')">Sky</button>
<button onclick="showLive(event,'wion')">WION</button>
<button onclick="showLive(event,'quad')">Quad</button>

</div>
</div>

<main>

<!-- HOME -->
<section id="home" class="tab active">
<div class="homeHero">
<img src="hero.png" class="heroImage">
<div class="heroOverlay">
<h2>BSG Strategic Awareness Dashboard</h2>
<p>Monitor global events in real time.</p>
<p class="heroTag">Stay informed. Stay ready.</p>
</div>
</div>
</section>

<!-- LIVE -->
<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame"
src="https://www.youtube.com/embed/gCNeDWCI0vo"
allowfullscreen></iframe>
</div>

<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/live_stream?channel=UC0p8r2u4z0lXc7n9KJz6zlw"></iframe>
<iframe src="https://www.youtube.com/embed/live_stream?channel=UCEXGDNclvmg6RW0vipJYsTQ"></iframe>
<iframe src="https://www.youtube.com/embed/live_stream?channel=UC_gUM8rL-Lrg6O3adPW9K1g"></iframe>
</div>

</section>

<!-- AFRICA PANEL -->
<section id="africa" class="tab">

<div id="news-widget">
<div class="button-row">
<button onclick="showCountries('West Africa')">West Africa</button>
<button onclick="showCountries('East Africa')">East Africa</button>
<button onclick="showCountries('Southern Africa')">Southern Africa</button>
</div>

<div class="country-row" id="country-buttons"></div>
<div class="news-row" id="news-links"></div>
</div>

</section>

<!-- MAPS -->
<section id="conflict" class="tab">
<iframe src="https://iran.liveuamap.com"></iframe>
</section>

<section id="aircraft" class="tab">
<iframe src="https://globe.adsbexchange.com"></iframe>
</section>

<section id="marine" class="tab">
<iframe src="https://www.marinetraffic.com"></iframe>
</section>

<section id="cyber" class="tab">
<iframe src="https://threatmap.checkpoint.com"></iframe>
</section>

<section id="radio" class="tab">
<iframe src="https://radio.garden"></iframe>
</section>

</main>

<!-- GLOBAL BAR -->
<div id="globalAfricaBar">
BSG: Pan African News
</div>

<!-- FOOTER -->
<footer class="mainFooter">
<div class="footerCenter">
<a href="https://BlackSurvivalGear.com">BlackSurvivalGear.com</a>
</div>
</footer>

<script>

/* CLOCK */
setInterval(()=>{
dateTime.textContent=new Date().toLocaleString()
},1000)

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

subMenuBar.style.display = btn.dataset.tab==="live" ? "block":"none"
liveMenu.style.display = btn.dataset.tab==="live" ? "flex":"none"
}
})

/* LIVE */
function showLive(e,c){
document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

liveSingle.style.display="block"
liveQuad.style.display="none"

if(c==="aj") liveFrame.src="https://www.youtube.com/embed/gCNeDWCI0vo"
if(c==="arise") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UC0p8r2u4z0lXc7n9KJz6zlw"
if(c==="channels") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UCEXGDNclvmg6RW0vipJYsTQ"
if(c==="africanews") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UC1_E8NeF5QHY2dtdLRBCCLA"
if(c==="rt") liveFrame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"
if(c==="sky") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UCoMdktPbSTixAyNGwb-UYkQ"
if(c==="wion") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UC_gUM8rL-Lrg6O3adPW9K1g"

if(c==="quad"){
liveSingle.style.display="none"
liveQuad.style.display="grid"
}
}

/* AFRICA DATA */
const africaData={
"West Africa":{
"Nigeria":["Vanguard","https://www.vanguardngr.com","Punch","https://www.punchng.com"],
"Ghana":["Graphic","https://graphic.com.gh"]
},
"East Africa":{
"Kenya":["Nation","https://nation.africa"]
},
"Southern Africa":{
"South Africa":["News24","https://www.news24.com"]
}
};

function showCountries(region){
country-buttons.innerHTML="";
Object.keys(africaData[region]).forEach(c=>{
let b=document.createElement("button");
b.textContent=c;
b.onclick=()=>showNews(region,c);
country-buttons.appendChild(b);
});
country-buttons.classList.add("active");
}

function showNews(region,country){
news-links.innerHTML="";
let d=africaData[region][country];
for(let i=0;i<d.length;i+=2){
let b=document.createElement("button");
b.innerHTML=`<a href="${d[i+1]}" target="_blank">${d[i]}</a>`;
news-links.appendChild(b);
}
news-links.classList.add("active");
}

</script>

</body>
</html>
