<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<meta name="color-scheme" content="dark">

<style>
.tradingview-widget-container,
.tradingview-widget-container__widget{
width:100%!important;
height:80vh!important;
}
</style>

</head>

<body>

<!-- 🔒 SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- 🔒 HEADER -->
<header class="mainHeader">
<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">
<div class="headerLeft">
<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<h1>Global Strategic Awareness OSINT</h1>
</div>
<div id="dateTime"></div>
</div>
</header>

<!-- 🔒 NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<!-- 🔒 SUBMENUS -->
<div id="subMenuBar">

<div id="liveMenu" class="subMenu">
<button onclick="showLive(event,'aj')" class="active">Al Jazeera</button>
<button onclick="showLive(event,'arise')">Arise</button>
<button onclick="showLive(event,'africanews')">Africa News</button>
<button onclick="showLive(event,'channels')">ChannelsTV</button>
<button onclick="showLive(event,'cgtn')">CGTN</button>
<button onclick="showLive(event,'rt')">RT</button>
<button onclick="showLive(event,'sky')">Sky</button>
<button onclick="showLive(event,'wion')">WION</button>
<button onclick="showLive(event,'Bloomberg')">Bloomberg</button>
<button onclick="showLive(event,'quad')">News Wall</button>
<button onclick="showLive(event,'africaQuad')">Africa Wall</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marketsMenu" class="subMenu">
<button onclick="showMarket(event,'overview')" class="active">Overview</button>
<button onclick="showMarket(event,'stocks')">Stocks</button>
<button onclick="showMarket(event,'crypto')">Crypto</button>
</div>

<div id="conflictMenu" class="subMenu">
<button onclick="showConflict(event,'liveuamap')" class="active">Live Map</button>
<button onclick="showConflict(event,'situation')">Situation</button>
<button onclick="showConflict(event,'world')">World</button>
</div>

</div>

<main>

<!-- 🔒 HERO -->
<section id="home" class="tab active">
<div class="homeHero">
<div class="heroOverlay">
<h2>Global Strategic Awareness OSINT</h2>
<p>Situational awareness is the foundation of preparedness.</p>
<p class="heroTag">Stay informed. Stay ready.</p>
</div>
</div>
</section>

<!-- 🔁 LIVE -->
<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame" src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
</div>

<div id="liveQuad" class="quadGrid" style="display:none;">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/W8nThq62Vb4"></iframe>
<iframe src="https://www.youtube.com/embed/BOy2xDU1LC8"></iframe>
<iframe src="https://www.youtube.com/embed/iEpJwprxDdk"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
</div>

<div id="africaQuad" class="quadGrid" style="display:none;">
<iframe src="https://www.youtube.com/embed/W8nThq62Vb4"></iframe>
<iframe src="https://www.youtube.com/embed/E8PRZmDUiPw"></iframe>
<iframe src="https://www.youtube.com/embed/NQjabLGdP5g"></iframe>
<iframe src="https://www.youtube.com/embed/Mv14aabg4mA"></iframe>
<iframe src="https://www.youtube.com/embed/iEpJwprxDdk"></iframe>
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
</div>

</section>

<!-- 🔁 MARKETS -->
<section id="markets" class="tab">

<div id="marketOverview">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
{"colorTheme":"dark","showChart":true}
</script>
</div>
</div>

<div id="marketStocks" style="display:none;">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
{"colorTheme":"dark"}
</script>
</div>
</div>

<div id="marketCrypto" style="display:none;">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
{"colorTheme":"dark"}
</script>
</div>
</div>

</section>

<!-- 🔁 CONFLICT -->
<section id="conflict" class="tab">
<iframe id="conflictFrame" src="https://iran.liveuamap.com"></iframe>
</section>

<section id="aircraft" class="tab"><iframe src="https://globe.adsbexchange.com"></iframe></section>
<section id="marine" class="tab"><iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"></iframe></section>
<section id="cyber" class="tab"><iframe src="https://threatmap.checkpoint.com"></iframe></section>
<section id="radio" class="tab"><iframe src="https://radio.garden/"></iframe></section>

</main>

<footer class="mainFooter">
<div class="footerTop">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<div class="footerVersion">BSG OSINT: VBase3.1</div>
</footer>

<script>

/* SPLASH */
window.addEventListener("load",()=>{
const splash=document.getElementById("introRadar");
setTimeout(()=>{
splash.style.opacity="0";
splash.style.pointerEvents="none";
setTimeout(()=>splash.remove(),600);
},1500);
});

/* CLOCK */
setInterval(()=>{
dateTime.textContent=new Date().toLocaleString()
},1000);

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");

subMenuBar.style.display="none";
document.querySelectorAll(".subMenu").forEach(m=>m.style.display="none");

if(btn.dataset.tab==="live"){subMenuBar.style.display="block";liveMenu.style.display="flex";}
if(btn.dataset.tab==="markets"){subMenuBar.style.display="block";marketsMenu.style.display="flex";}
if(btn.dataset.tab==="conflict"){subMenuBar.style.display="block";conflictMenu.style.display="flex";}
};
});

/* LIVE */
function showLive(e,c){
document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

liveSingle.style.display="block";
liveQuad.style.display="none";
africaQuad.style.display="none";

const map={
aj:"gCNeDWCI0vo",
arise:"E8PRZmDUiPw",
channels:"W8nThq62Vb4",
cgtn:"BOy2xDU1LC8",
sky:"YDvsBbKfLPA",
wion:"h9SRBxdqNcs",
Bloomberg:"iEpJwprxDdk"
};

if(map[c]) liveFrame.src=`https://www.youtube.com/embed/${map[c]}`;
if(c==="africanews") liveFrame.src="https://www.youtube.com/embed/live_stream?channel=UC1_E8NeF5QHY2dtdLRBCCLA";
if(c==="rt") liveFrame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3";

if(c==="quad"){liveSingle.style.display="none";liveQuad.style.display="grid";}
if(c==="africaQuad"){liveSingle.style.display="none";africaQuad.style.display="grid";}
}

/* MARKETS */
function showMarket(e,t){
document.querySelectorAll("#marketsMenu button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

marketOverview.style.display="none";
marketStocks.style.display="none";
marketCrypto.style.display="none";

if(t==="overview") marketOverview.style.display="block";
if(t==="stocks") marketStocks.style.display="block";
if(t==="crypto") marketCrypto.style.display="block";
}

/* WEATHER */
weatherBtn.onclick=()=>window.open("https://www.windy.com","_blank");

/* FULLSCREEN */
function fullscreenPlayer(){
let el=liveSingle;
if(liveQuad.style.display==="grid") el=liveQuad;
if(africaQuad.style.display==="grid") el=africaQuad;
if(el.requestFullscreen) el.requestFullscreen();
}

/* CONFLICT */
function showConflict(e,type){
document.querySelectorAll("#conflictMenu button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

if(type==="liveuamap") conflictFrame.src="https://iran.liveuamap.com";
if(type==="situation") window.open("https://monitor-the-situation.com/","_blank");
if(type==="world") window.open("https://www.worldmonitor.app/?hl=en-GB","_blank");
}

</script>

</body>
</html>
