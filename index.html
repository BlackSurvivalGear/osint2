<script src="africaData.js"></script>

<script>
/* SPLASH FIX: FORCE EXIT */
document.addEventListener("DOMContentLoaded", function(){
    const splash = document.getElementById("introRadar");
    // Start fade after 1.5s
    setTimeout(() => {
        if(splash) splash.style.opacity = "0";
        // Fully remove from DOM after fade finishes
        setTimeout(() => {
            if(splash) splash.style.display = "none";
        }, 600);
    }, 1500);

    // Absolute fallback: If still present after 4s, kill it
    setTimeout(() => {
        if(splash && splash.style.display !== "none") {
            splash.style.display = "none";
        }
    }, 4000);
});

/* CLOCK */
setInterval(() => {
    document.getElementById("dateTime").textContent = new Date().toLocaleString();
}, 1000);

/* NAV */
document.querySelectorAll("#mainNav button").forEach(btn => {
    btn.addEventListener("click", () => {
        if(!btn.dataset.tab) return;
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll("#mainNav button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
        
        const subMenuBar = document.getElementById("subMenuBar");
        subMenuBar.style.display = "none";
        document.querySelectorAll(".subMenu").forEach(m => m.style.display = "none");

        if(btn.dataset.tab === "live"){ subMenuBar.style.display = "block"; liveMenu.style.display = "flex"; }
        else if(btn.dataset.tab === "conflict"){ subMenuBar.style.display = "block"; conflictMenu.style.display = "flex"; }
        else if(btn.dataset.tab === "markets"){ subMenuBar.style.display = "block"; marketsMenu.style.display = "flex"; }
    });
});

/* CONFLICT */
function showConflict(e,c){
    document.querySelectorAll("#conflictMenu button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    document.getElementById("conflictSituation").style.display = c === "situation" ? "block" : "none";
    document.getElementById("conflictWorld").style.display = c === "world" ? "block" : "none";
}

/* MARKETS */
function showMarket(e,t){
    document.querySelectorAll("#marketsMenu button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    document.getElementById("marketOverview").style.display = t === "overview" ? "block" : "none";
}

/* WEATHER */
document.getElementById("weatherBtn").onclick = () => window.open("https://www.windy.com","_blank");

/* AFRICA HELPERS */
function showCountries(region){
    const c = document.getElementById('country-buttons');
    c.innerHTML = '';
    Object.keys(africaData[region]).forEach(country => {
        let b = document.createElement('button');
        b.textContent = country;
        b.onclick = () => showNews(region,country);
        c.appendChild(b);
    });
}
function showNews(region,country){
    const n = document.getElementById('news-links');
    n.innerHTML = '';
    let links = africaData[region][country];
    for(let i=0; i<links.length; i+=2){
        let b = document.createElement('button');
        b.innerHTML = `<a href="${links[i+1]}" target="_blank">${links[i]}</a>`;
        n.appendChild(b);
    }
}
document.getElementById("africaToggle").onclick = () => document.getElementById("africaContent").classList.toggle("active");
</script>
