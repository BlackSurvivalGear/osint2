<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
.tradingview-widget-container,
.tradingview-widget-container__widget{
width:100%!important;
height:80vh!important;
}

/* AFRICA DRAWER */
#africaDrawer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#010404;
border-top:1px solid #00ffaa33;
z-index:999;
}

#africaToggle{
width:100%;
padding:10px;
background:#021212;
border:none;
color:#00ffaa;
font-weight:bold;
cursor:pointer;
}

#africaContent{
display:none;
padding:10px;
max-height:300px;
overflow-y:auto;
}

#africaContent.active{
display:block;
}

.regionButtons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:10px;
}

#country-buttons,
#news-links{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
}

#africaDrawer button{
padding:6px 10px;
background:#021212;
border:1px solid #00ffaa66;
color:#00ffaa;
cursor:pointer;
}

#news-links a{
color:#00ffaa;
text-decoration:none;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerContent">
<h1>Global Strategic Awareness OSINT</h1>
<div id="dateTime"></div>
</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<main>

<!-- HOME -->
<section id="home" class="tab active">
<h2 style="padding:40px;text-align:center;">Operational Dashboard</h2>
</section>

<!-- LIVE -->
<section id="live" class="tab">
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo" style="width:100%;height:80vh;"></iframe>
</section>

<!-- OTHER PANELS -->
<section id="conflict" class="tab"><iframe src="https://iran.liveuamap.com"></iframe></section>
<section id="markets" class="tab"></section>
<section id="aircraft" class="tab"><iframe src="https://globe.adsbexchange.com"></iframe></section>
<section id="marine" class="tab"><iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"></iframe></section>
<section id="cyber" class="tab"><iframe src="https://threatmap.checkpoint.com"></iframe></section>
<section id="radio" class="tab"><iframe src="https://radio.garden/"></iframe></section>

</main>

<!-- ========================= -->
<!-- AFRICA INTEL DRAWER -->
<!-- ========================= -->

<div id="africaDrawer">

<button id="africaToggle">▲ AFRICA INTEL</button>

<div id="africaContent">

<div class="regionButtons">
<button onclick="showCountries('North Africa')">North</button>
<button onclick="showCountries('West Africa')">West</button>
<button onclick="showCountries('Central Africa')">Central</button>
<button onclick="showCountries('East Africa')">East</button>
<button onclick="showCountries('Southern Africa')">South</button>
</div>

<div id="country-buttons"></div>
<div id="news-links"></div>

</div>
</div>

<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->

<!-- 🔴 LOAD DATA FIRST -->
<script src="africaData.js"></script>

<script>

/* ========================= */
/* AFRICA FUNCTIONS */
/* ========================= */

function showCountries(region){
const c=document.getElementById('country-buttons');
const n=document.getElementById('news-links');
c.innerHTML='';
n.innerHTML='';

Object.keys(africaData[region]).forEach(country=>{
let b=document.createElement('button');
b.textContent=country;
b.onclick=()=>showNews(region,country);
c.appendChild(b);
});
}

function showNews(region,country){
const n=document.getElementById('news-links');
n.innerHTML='';

let links=africaData[region][country];

for(let i=0;i<links.length;i+=2){
let b=document.createElement('button');
b.innerHTML=`<a href="${links[i+1]}" target="_blank">${links[i]}</a>`;
n.appendChild(b);
}
}

/* ========================= */
/* DRAWER TOGGLE */
/* ========================= */

document.getElementById("africaToggle").onclick=function(){
document.getElementById("africaContent").classList.toggle("active");
};

/* ========================= */
/* CLOCK */
/* ========================= */

setInterval(()=>{
document.getElementById("dateTime").textContent=new Date().toLocaleString()
},1000);

/* ========================= */
/* NAVIGATION */
/* ========================= */

document.querySelectorAll("nav button").forEach(btn=>{
btn.addEventListener("click", ()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")
});
});

/* ========================= */
/* WEATHER */
/* ========================= */

document.getElementById("weatherBtn").addEventListener("click", function(e){
e.stopPropagation();
window.open("https://www.windy.com/?6.842,26.166,3","_blank");
});

/* ========================= */
/* SPLASH */
/* ========================= */

document.addEventListener("DOMContentLoaded", function(){
const splash=document.getElementById("introRadar");
setTimeout(()=>{
splash.style.opacity="0";
setTimeout(()=>{splash.style.display="none"},600);
},1500);
});

</script>

</body>
</html>
