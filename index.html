<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSG Strategic Awareness OSINT - VBase4</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <meta name="color-scheme" content="dark">

    <style>
        .tradingview-widget-container,
        .tradingview-widget-container__widget {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

    <div id="introRadar">
        <video autoplay muted playsinline>
            <source src="RADAR3.mp4">
        </video>
    </div>

    <header class="mainHeader">
        <div class="headerVideo">
            <video autoplay muted loop playsinline>
                <source src="HEADER3.mp4">
            </video>
        </div>

        <div class="headerContent">
            <div class="headerLeft">
                <div class="radarLogo">
                    <video autoplay muted loop playsinline>
                        <source src="RADAR3.mp4">
                    </video>
                </div>
                <h1>Global Strategic Awareness OSINT</h1>
            </div>
            <div id="dateTime"></div>
        </div>
    </header>

    <nav>
        <button data-tab="home" class="active">Home</button>
        <button data-tab="live">LIVE NEWS</button>
        <button data-tab="conflict">CONFLICT MAP</button>
        <button data-tab="markets">Markets</button>
        <button data-tab="aircraft">Aircraft Watch</button>
        <button data-tab="marine">Marine Watch</button>
        <button data-tab="cyber">Cyber Attacks</button>
        <button data-tab="radio">Global Radio</button>
        <button id="weatherBtn">Weather</button>
    </nav>

    <div id="subMenuBar">

        <div id="liveMenu" class="subMenu">
            <button onclick="showLive(event,'aj')" class="active">Al Jazeera</button>
            <button onclick="showLive(event,'arise')">Arise News</button>
            <button onclick="showLive(event,'africanews')">Africa News</button>
            <button onclick="showLive(event,'channels')">ChannelsTV</button>
            <button onclick="showLive(event,'cgtn')">CGTN</button>
            <button onclick="showLive(event,'rt')">RT</button>
            <button onclick="showLive(event,'sky')">SKY</button>
            <button onclick="showLive(event,'wion')">WION</button>
            <button onclick="showLive(event,'Bloomberg')">Bloomberg</button>
            <button onclick="showLive(event,'quad')">News Wall</button>
            <button onclick="showLive(event,'africaQuad')">Africa Wall</button>
            <button onclick="fullscreenPlayer()">Full Screen</button>
        </div>

        <div id="conflictMenu" class="subMenu">
            <a href="https://monitor-the-situation.com/" target="_blank" rel="noopener noreferrer" class="subMenuLink">Situation</a>
            <a href="https://www.worldmonitor.app/" target="_blank" rel="noopener noreferrer" class="subMenuLink">World</a>
        </div>

        <div id="marketsMenu" class="subMenu">
            <button onclick="showMarket(event,'overview')" class="active">Overview</button>
            <button onclick="showMarket(event,'stocks')">Stock Heatmap</button>
            <button onclick="showMarket(event,'crypto')">Crypto Heatmap</button>
        </div>

        <div class="marketTicker">
            <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
            <tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD,TVC:SILVER,BLACKBULL:BRENT,OANDA:GBPUSD,FX_IDC:GBPNGN,BINANCE:SOLUSDT,BINANCE:AVAXUSDT,BINANCE:RENDERUSDT" item-size="compact" hover-type="performance-grid" show-hover theme="dark">
            </tv-ticker-tape>
        </div>
    </div>

    <main>

        <section id="home" class="tab active">
            <div class="homeGrid">
                <div class="homeHero">
                    <img src="hero.png" class="heroImage">
                    <div class="heroOverlay">
                        <h2>BSG Strategic Awareness Dashboard</h2>
                        <p>Situational awareness is the foundation of preparedness.</p>
                        <p class="heroTag">Stay informed. Stay ready.</p>
                    </div>
                </div>
                <div class="intelFeed">
                    <div class="intelHeader">REAL-TIME SIGNAL: @Liveuamap</div>
                    <div id="rssContent">Initialising secure link...</div>
                </div>
            </div>
        </section>

        <section id="live" class="tab">
            <div id="liveSingle" class="livePlayer">
                <iframe id="liveFrame" src="https://www.youtube.com/embed/gCNeDWCI0vo" allowfullscreen></iframe>
            </div>

            <div id="liveQuad" class="quadGrid">
                <iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
                <iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
                <iframe src="https://www.youtube.com/embed/W8nThq62Vb4"></iframe>
                <iframe src="https://www.youtube.com/embed/BOy2xDU1LC8"></iframe>
                <iframe src="https://www.youtube.com/embed/iEpJwprxDdk"></iframe>
                <iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
            </div>

            <div id="africaQuad" class="quadGrid" style="display:none;">
                <iframe src="https://www.youtube.com/embed/W8nThq62Vb4"></iframe>
                <iframe src="https://www.youtube.com/embed/E8PRZmDUiPw"></iframe>
                <iframe src="https://www.youtube.com/embed/NQjabLGdP5g"></iframe>
                <iframe src="https://www.youtube.com/embed/Mv14aabg4mA"></iframe>
                <iframe src="https://www.youtube.com/embed/iEpJwprxDdk"></iframe>
                <iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
            </div>
        </section>

        <section id="conflict" class="tab">
            <iframe id="conflictMainMap" src="https://iran.liveuamap.com/" style="width:100%;height:80vh;border:0;"></iframe>
        </section>

        <section id="markets" class="tab">
            <div id="marketOverview">
                <div class="marketSplitLayout">
                    <div class="marketWidgetSide">
                        <div class="tradingview-widget-container">
                            <div class="tradingview-widget-container__widget"></div>
                            <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                                {
                                    "colorTheme": "dark",
                                    "dateRange": "12M",
                                    "showChart": true,
                                    "locale": "en",
                                    "isTransparent": false,
                                    "showSymbolLogo": true,
                                    "width": "100%",
                                    "height": "100%"
                                }
                            </script>
                        </div>
                    </div>
                    <div class="marketVideoSide">
                        <iframe src="https://www.youtube.com/embed/iEpJwprxDdk" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <div id="marketStocks" style="display:none;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                            "dataSource": "SPX500",
                            "grouping": "sector",
                            "blockSize": "market_cap_basic",
                            "blockColor": "change",
                            "locale": "en",
                            "colorTheme": "dark"
                        }
                    </script>
                </div>
            </div>

            <div id="marketCrypto" style="display:none;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                        {
                            "dataSource": "Crypto",
                            "blockSize": "market_cap_calc",
                            "blockColor": "change",
                            "locale": "en",
                            "colorTheme": "dark"
                        }
                    </script>
                </div>
            </div>
        </section>

        <section id="aircraft" class="tab"><iframe src="https://globe.adsbexchange.com"></iframe></section>
        <section id="marine" class="tab"><iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"></iframe></section>
        <section id="cyber" class="tab"><iframe src="https://threatmap.checkpoint.com"></iframe></section>
        <section id="radio" class="tab"><iframe src="https://radio.garden/"></iframe></section>

    </main>

    <footer class="mainFooter">
        <div class="footerTop">
            <video autoplay muted loop playsinline>
                <source src="RADAR3.mp4">
            </video>
        </div>
        <div class="footerVersion">BSG OSINT: VBase4</div>
        <div class="footerCenter">
            <a href="https://BlackSurvivalGear.com">BlackSurvivalGear.com</a>
        </div>
    </footer>

    <div id="africaDrawer">
        <button id="africaToggle">▲ PAN AFRICAN NEWS DRAW</button>
        <div id="africaContent">
            <div class="regionButtons">
                <button onclick="showCountries('North Africa')">North</button>
                <button onclick="showCountries('West Africa')">West</button>
                <button onclick="showCountries('Central Africa')">Central</button>
                <button onclick="showCountries('East Africa')">East</button>
                <button onclick="showCountries('Southern Africa')">South</button>
            </div>
            <div id="country-buttons"></div>
            <div id="news-links"></div>
        </div>
    </div>

    <script src="africaData.js"></script>

    <script>
        /* SPLASH & CLOCK */
        document.addEventListener("DOMContentLoaded", () => {
            const splash = document.getElementById("introRadar");
            setTimeout(() => {
                splash.style.opacity = "0";
                setTimeout(() => splash.style.display = "none", 600);
            }, 1500);
            fetchIntel();
        });
        setInterval(() => document.getElementById("dateTime").textContent = new Date().toLocaleString(), 1000);

        /* INTEL FEED FETCH */
        async function fetchIntel() {
            const rssUrl = 'https://nitter.net/Liveuamap/rss';
            const proxy = 'https://api.allorigins.win/get?url=';
            try {
                const response = await fetch(proxy + encodeURIComponent(rssUrl));
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                let html = "";
                items.forEach(el => {
                    html += `<div class="rssItem">
                        <span class="rssDate">${el.querySelector("pubDate").textContent}</span>
                        <a href="${el.querySelector("link").textContent}" target="_blank">> ${el.querySelector("title").textContent}</a>
                    </div>`;
                });
                document.getElementById("rssContent").innerHTML = html;
            } catch (err) {
                document.getElementById("rssContent").innerHTML = "LINK INTERRUPTED: RETRYING...";
            }
        }
        setInterval(fetchIntel, 300000);

        /* NAV LOGIC */
        document.querySelectorAll("nav button").forEach(btn => {
            btn.addEventListener("click", () => {
                if (!btn.dataset.tab) return;
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(btn.dataset.tab).classList.add("active");
                const subMenuBar = document.getElementById("subMenuBar");
                subMenuBar.style.display = "none";
                document.querySelectorAll(".subMenu").forEach(m => m.style.display = "none");
                if (["live", "conflict", "markets"].includes(btn.dataset.tab)) {
                    subMenuBar.style.display = "block";
                    document.getElementById(btn.dataset.tab + "Menu").style.display = "flex";
                }
            });
        });

        /* MARKET SELECTOR */
        function showMarket(e, t) {
            document.querySelectorAll("#marketsMenu button").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
            ["marketOverview", "marketStocks", "marketCrypto"].forEach(id => document.getElementById(id).style.display = "none");
            document.getElementById(t === "overview" ? "marketOverview" : t === "stocks" ? "marketStocks" : "marketCrypto").style.display = "block";
        }

        /* LIVE PLAYER LOGIC */
        function showLive(e, c) {
            document.querySelectorAll("#liveMenu button").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
            const liveSingle = document.getElementById("liveSingle"), liveQuad = document.getElementById("liveQuad"), africaQuad = document.getElementById("africaQuad"), liveFrame = document.getElementById("liveFrame");
            liveSingle.style.display = "block"; liveQuad.style.display = "none"; africaQuad.style.display = "none";
            const channels = { aj: "gCNeDWCI0vo", arise: "E8PRZmDUiPw", channels: "W8nThq62Vb4", sky: "YDvsBbKfLPA", wion: "h9SRBxdqNcs", cgtn: "BOy2xDU1LC8", Bloomberg: "iEpJwprxDdk" };
            if (channels[c]) liveFrame.src = `https://www.youtube.com/embed/${channels[c]}`;
            if (c === "rt") liveFrame.src = "https://rumble.com/embed/v33aw1a/?pub=4jw3x3";
            if (c === "quad") { liveSingle.style.display = "none"; liveQuad.style.display = "grid"; }
            if (c === "africaQuad") { liveSingle.style.display = "none"; africaQuad.style.display = "grid"; }
        }

        /* WEATHER & FULLSCREEN */
        document.getElementById("weatherBtn").onclick = () => window.open("https://www.windy.com", "_blank");
        function fullscreenPlayer() {
            let el = document.getElementById("liveSingle");
            if (document.getElementById("liveQuad").style.display === "grid") el = document.getElementById("liveQuad");
            if (document.getElementById("africaQuad").style.display === "grid") el = document.getElementById("africaQuad");
            if (el.requestFullscreen) el.requestFullscreen();
        }

        /* AFRICA DATA HELPERS */
        function showCountries(r) {
            const c = document.getElementById('country-buttons'); c.innerHTML = '';
            Object.keys(africaData[r]).forEach(country => {
                let b = document.createElement('button'); b.textContent = country;
                b.onclick = () => showNews(r, country); c.appendChild(b);
            });
        }
        function showNews(r, c) {
            const n = document.getElementById('news-links'); n.innerHTML = '';
            let links = africaData[r][c];
            for (let i = 0; i < links.length; i += 2) {
                let b = document.createElement('button'); b.innerHTML = `<a href="${links[i + 1]}" target="_blank">${links[i]}</a>`;
                n.appendChild(b);
            }
        }
        document.getElementById("africaToggle").onclick = () => document.getElementById("africaContent").classList.toggle("active");
    </script>
</body>
</html>
