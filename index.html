<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerContent">

<div class="headerLeft">
<h1>Global Strategic Awareness OSINT</h1>
</div>

<div id="dateTime"></div>

</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">MARKETS</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">WEATHER</button>
</nav>

<!-- SUB MENU -->
<div id="subMenuBar">

<div id="liveMenu" class="subMenu">
<button onclick="showLive(event,'rt')" class="active">RT</button>
<button onclick="showLive(event,'aj')">Al Jazeera</button>
<button onclick="showLive(event,'wion')">Sky News</button>
<button onclick="showLive(event,'sky')">WION</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marineMenu" class="subMenu">
<button onclick="showMarineTraffic(event)" class="active">Marine Traffic</button>
<button onclick="showMarinePoint(event,'hormuz')">Hormuz</button>
<button onclick="showMarinePoint(event,'malacca')">Malacca</button>
</div>

</div>

<main>

<!-- HOME -->
<section id="home" class="tab active">

<div class="homeHero">
<img src="hero.png" class="heroImage">

<div class="heroOverlay">
<h2>BSG Strategic Awareness Dashboard</h2>
<p>
Integrated OSINT monitoring platform providing real-time intelligence across conflicts,
markets, cyber activity, aviation tracking and maritime movement.
</p>
</div>
</div>

<!-- ✅ QUOTE BELOW HERO -->
<div class="intelQuotes">
<h2 id="quoteText">Loading...</h2>
</div>

</section>

<!-- LIVE -->
<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"
allowfullscreen></iframe>
</div>

<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc"></iframe>
</div>

</section>

<!-- MARKETS -->
<section id="markets" class="tab">
<iframe src="https://s.tradingview.com/embed-widget/market-overview/"></iframe>
</section>

<!-- CONFLICT -->
<section id="conflict" class="tab">
<iframe src="https://iran.liveuamap.com"></iframe>
</section>

<!-- AIR -->
<section id="aircraft" class="tab">
<iframe src="https://globe.adsbexchange.com"></iframe>
</section>

<!-- MARINE -->
<section id="marine" class="tab">
<iframe src="https://www.marinetraffic.com"></iframe>
</section>

<!-- CYBER -->
<section id="cyber" class="tab">
<iframe src="https://threatmap.checkpoint.com"></iframe>
</section>

<!-- RADIO -->
<section id="radio" class="tab">
<iframe src="https://radio.garden/"></iframe>
</section>

</main>

<script>

/* WEATHER */
document.getElementById("weatherBtn").onclick = () => {
window.open("https://www.windy.com/?6.842,26.166,3","_blank");
};

/* CLOCK */
function updateClock(){
const now=new Date();
document.getElementById("dateTime").textContent = now.toLocaleString();
}
setInterval(updateClock,1000);

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");

document.getElementById("subMenuBar").style.display="none";
document.getElementById("liveMenu").style.display="none";
document.getElementById("marineMenu").style.display="none";

if(btn.dataset.tab==="live"){
document.getElementById("subMenuBar").style.display="block";
document.getElementById("liveMenu").style.display="flex";
}

if(btn.dataset.tab==="marine"){
document.getElementById("subMenuBar").style.display="block";
document.getElementById("marineMenu").style.display="flex";
}
};
});

/* LIVE SWITCH */
function showLive(e,type){
const frame=document.getElementById("liveFrame");

if(type==="rt") frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3";
if(type==="aj") frame.src="https://www.youtube.com/embed/gCNeDWCI0vo";
if(type==="wion") frame.src="https://www.youtube.com/embed/YDvsBbKfLPA";
if(type==="sky") frame.src="https://www.youtube.com/embed/vfszY1JYbMc";
}

/* QUOTES */
const quotes=[
"We face neither East nor West; we face forward.",
"It always seems impossible until it is done.",
"When spider webs unite, they can tie up a lion.",
"A single hand cannot clap."
];

let i=0;

function nextQuote(){
document.getElementById("quoteText").textContent =
`"${quotes[i++ % quotes.length]}"`;
}

nextQuote();
setInterval(nextQuote,6000);

</script>

</body>
</html>
