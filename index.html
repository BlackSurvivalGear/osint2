<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
  <div class="radar-text">BSG OSINT SYSTEM</div>
</div>

<!-- NAV -->
<div class="navbar">
  <button class="tab-btn active" onclick="openTab('live')">LIVE</button>
  <button class="tab-btn" onclick="openTab('markets')">MARKETS</button>
  <button class="tab-btn" onclick="openTab('osint')">OSINT</button>
  <button class="tab-btn" onclick="openTab('tools')">TOOLS</button>
</div>

<!-- LIVE -->
<div id="live" class="tab-content active">
  <div class="quad">
    <iframe src="https://www.aljazeera.com/live/" frameborder="0"></iframe>
    <iframe src="https://www.rt.com/on-air/" frameborder="0"></iframe>
    <iframe src="https://www.youtube.com/embed/21X5lGlDOfg" frameborder="0"></iframe>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC16niRr50-MSBwiO3YDb3RA" frameborder="0"></iframe>
  </div>
</div>

<!-- MARKETS -->
<div id="markets" class="tab-content">
  <div class="quad">
    <iframe src="https://s.tradingview.com/embed-widget/market-overview/" frameborder="0"></iframe>
    <iframe src="https://s.tradingview.com/embed-widget/crypto-screener/" frameborder="0"></iframe>
    <iframe src="https://s.tradingview.com/embed-widget/forex-cross-rates/" frameborder="0"></iframe>
    <div class="placeholder">MARKETS PANEL</div>
  </div>
</div>

<!-- OSINT -->
<div id="osint" class="tab-content">
  <div class="quad">
    <iframe src="https://liveuamap.com" frameborder="0"></iframe>
    <iframe src="https://globe.adsbexchange.com" frameborder="0"></iframe>
    <iframe src="https://www.marinetraffic.com" frameborder="0"></iframe>
    <iframe src="https://cybermap.kaspersky.com" frameborder="0"></iframe>
  </div>
</div>

<!-- TOOLS -->
<div id="tools" class="tab-content">

  <div class="subnav">
    <button class="sub-btn active" onclick="openTool('tool1', this)">WorldMonitor</button>
    <button class="sub-btn" onclick="openTool('tool2', this)">Tool 2</button>
    <button class="sub-btn" onclick="openTool('tool3', this)">Tool 3</button>
  </div>

  <!-- :contentReference[oaicite:0]{index=0} -->
  <div id="tool1" class="tool-panel active">
  <a href="https://www.worldmonitor.app" target="_blank">
<button>OPEN INTEL CORE</button>
</a>
  </div>

  <div id="tool2" class="tool-panel">
    <div class="placeholder">TOOL SLOT 2 READY</div>
  </div>

  <div id="tool3" class="tool-panel">
    <div class="placeholder">TOOL SLOT 3 READY</div>
  </div>

</div>

<!-- SCRIPT -->
<script>

function openTab(tabId) {
  const tabs = document.querySelectorAll('.tab-content');
  const buttons = document.querySelectorAll('.tab-btn');

  tabs.forEach(t => t.classList.remove('active'));
  buttons.forEach(b => b.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');

  event.target.classList.add('active');
}

function openTool(toolId, btn) {
  const panels = document.querySelectorAll('.tool-panel');
  const buttons = document.querySelectorAll('.sub-btn');

  panels.forEach(p => p.classList.remove('active'));
  buttons.forEach(b => b.classList.remove('active'));

  document.getElementById(toolId).classList.add('active');
  btn.classList.add('active');
}

/* Splash remove */
setTimeout(() => {
  document.getElementById("introRadar").style.display = "none";
}, 2000);

</script>

</body>
</html>
