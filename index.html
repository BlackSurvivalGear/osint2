<script>

/* WEATHER */
document.getElementById("weatherBtn").addEventListener("click", function(e){
    e.stopPropagation();
    window.open("https://www.windy.com/?6.842,26.166,3", "_blank");
});

/* SPLASH */
document.addEventListener("DOMContentLoaded", function(){
const splash = document.getElementById("introRadar");
setTimeout(()=>{
    splash.style.opacity = "0";
    setTimeout(()=>{ splash.style.display="none"; },600);
},1500);
});

/* CLOCK */
function updateClock(){
const now=new Date()
const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()

let hours=now.getHours()
let minutes=now.getMinutes()
let ampm=hours>=12?"PM":"AM"

hours=hours%12
hours=hours?hours:12
minutes=minutes<10?"0"+minutes:minutes

document.getElementById("dateTime").textContent =
`${day} ${date} ${month} ${year}, ${hours}:${minutes}${ampm}`
}
setInterval(updateClock,1000)
updateClock()

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.addEventListener("click",()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

document.getElementById("subMenuBar").style.display="none"
document.getElementById("liveMenu").style.display="none"
document.getElementById("marineMenu").style.display="none"

if(btn.dataset.tab==="live"){
document.getElementById("subMenuBar").style.display="block"
document.getElementById("liveMenu").style.display="flex"
}

if(btn.dataset.tab==="marine"){
document.getElementById("subMenuBar").style.display="block"
document.getElementById("marineMenu").style.display="flex"
showMarineTraffic()
}
});
});

/* QUOTES */
const content=[
{text:"We face neither East nor West; we face forward.",author:"Nkrumah"},
{text:"It always seems impossible until it is done.",author:"Mandela"},
{text:"When spider webs unite, they can tie up a lion."},
{text:"A single hand cannot clap."}
];

let i=0;

function nextQuote(){
const item=content[i++ % content.length];

document.getElementById("quoteText").textContent =
`"${item.text}"${item.author ? " — " + item.author : ""}`;
}

nextQuote();
setInterval(nextQuote,6000);

</script>
