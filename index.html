<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
/* QUAD FOCUS */
.quadGrid.quadFocus iframe { display:none; }
.quadGrid.quadFocus iframe.activeQuad{
display:block;
width:100%;
height:100%;
grid-column:1/-1;
grid-row:1/-1;
}

/* TRADINGVIEW FIX */
.tradingview-widget-container,
.tradingview-widget-container__widget{
width:100%!important;
height:80vh!important;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<!-- HEADER -->
<header class="mainHeader">
<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">
<div class="headerLeft">
<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>
<h1>Global Strategic Awareness OSINT</h1>
</div>
<div id="dateTime"></div>
</div>
</header>

<!-- NAV -->
<nav>
<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="conflict">CONFLICT MAP</button>
<button data-tab="markets">Markets</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>
<button id="weatherBtn">Weather</button>
</nav>

<!-- SUB MENUS -->
<div id="subMenuBar">

<div id="liveMenu" class="subMenu">
<button onclick="showLive(event,'rt')" class="active">RT</button>
<button onclick="showLive(event,'aj')">Al Jazeera</button>
<button onclick="showLive(event,'wion')">Sky News</button>
<button onclick="showLive(event,'sky')">WION</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marketsMenu" class="subMenu">
<button onclick="showMarket(event,'overview')" class="active">Overview</button>
<button onclick="showMarket(event,'stocks')">Stock Heatmap</button>
<button onclick="showMarket(event,'crypto')">Crypto Heatmap</button>
</div>

</div>

<main>

<section id="home" class="tab active"></section>

<!-- LIVE -->
<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"
allowfullscreen></iframe>
</div>

<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo?mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA?mute=1"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc?mute=1"></iframe>
</div>

</section>

<!-- MARKETS -->
<section id="markets" class="tab">

<div id="marketOverview">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
{
"colorTheme":"dark",
"backgroundColor":"#020606",
"width":"100%",
"height":"100%"
}
</script>
</div>
</div>

<div id="marketStocks" style="display:none;">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
{
"colorTheme":"dark",
"backgroundColor":"#020606",
"dataSource":"SPX500",
"width":"100%",
"height":"100%"
}
</script>
</div>
</div>

<div id="marketCrypto" style="display:none;">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
{
"colorTheme":"dark",
"backgroundColor":"#020606",
"dataSource":"Crypto",
"width":"100%",
"height":"100%"
}
</script>
</div>
</div>

</section>

<section id="conflict" class="tab"><iframe src="https://iran.liveuamap.com"></iframe></section>
<section id="aircraft" class="tab"><iframe src="https://globe.adsbexchange.com"></iframe></section>
<section id="marine" class="tab"><iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"></iframe></section>
<section id="cyber" class="tab"><iframe src="https://threatmap.checkpoint.com"></iframe></section>
<section id="radio" class="tab"><iframe src="https://radio.garden/"></iframe></section>

</main>

<script>

/* SPLASH — HARD FIX */
(function(){
function killSplash(){
    const splash = document.getElementById("introRadar");
    if(!splash) return;
    splash.style.opacity="0";
    setTimeout(()=>{splash.style.display="none"},600);
}
window.addEventListener("load",()=>{setTimeout(killSplash,1500)});
setTimeout(()=>{
    const splash=document.getElementById("introRadar");
    if(splash) splash.style.display="none";
},5000);
})();

/* CLOCK */
setInterval(()=>{
document.getElementById("dateTime").textContent=new Date().toLocaleString()
},1000)

/* NAV */
const subMenuBar=document.getElementById("subMenuBar");
const liveMenu=document.getElementById("liveMenu");
const marketsMenu=document.getElementById("marketsMenu");

document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{
if(!btn.dataset.tab) return;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

subMenuBar.style.display="none"
document.querySelectorAll(".subMenu").forEach(m=>m.style.display="none")

if(btn.dataset.tab==="live"){
subMenuBar.style.display="block"
liveMenu.style.display="flex"
}
if(btn.dataset.tab==="markets"){
subMenuBar.style.display="block"
marketsMenu.style.display="flex"
}
}
})

/* LIVE */
const liveSingle=document.getElementById("liveSingle");
const liveQuad=document.getElementById("liveQuad");
const liveFrame=document.getElementById("liveFrame");

function showLive(e,c){
document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

liveSingle.style.display="block"
liveQuad.style.display="none"

if(c==="rt") liveFrame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3&mute=1"
if(c==="aj") liveFrame.src="https://www.youtube.com/embed/gCNeDWCI0vo?mute=1"
if(c==="wion") liveFrame.src="https://www.youtube.com/embed/YDvsBbKfLPA?mute=1"
if(c==="sky") liveFrame.src="https://www.youtube.com/embed/vfszY1JYbMc?mute=1"

if(c==="quad"){
liveSingle.style.display="none"
liveQuad.style.display="grid"
}
}

/* MARKETS */
function showMarket(e,t){
document.querySelectorAll("#marketsMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

["marketOverview","marketStocks","marketCrypto"]
.forEach(id=>document.getElementById(id).style.display="none")

document.getElementById("market"+t.charAt(0).toUpperCase()+t.slice(1)).style.display="block"

setTimeout(()=>window.dispatchEvent(new Event('resize')),120)
}

/* FULLSCREEN */
function fullscreenPlayer(){
let player=(liveQuad.style.display==="grid")?liveQuad:liveSingle
player.requestFullscreen()
}

</script>

</body>
</html>
